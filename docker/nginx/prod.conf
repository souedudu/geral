# =====================================================================
# Stack unificada — produção
# - lar:         HTTPS em larpadronização.com.br (xn--larpadronizao-7eb3d.com.br)
# - restaurante: HTTP  em 143.95.213.17 e *.143.95.213.17.sslip.io
# =====================================================================

# ────────────────────────────────────────────────────────────
# LAR :80 → redirect HTTPS + ACME challenge
# ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name xn--larpadronizao-7eb3d.com.br www.xn--larpadronizao-7eb3d.com.br;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ────────────────────────────────────────────────────────────
# LAR :443
# ────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name xn--larpadronizao-7eb3d.com.br www.xn--larpadronizao-7eb3d.com.br;

    root /var/www/lar/public;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/xn--larpadronizao-7eb3d.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--larpadronizao-7eb3d.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    if ($bad_bot) { return 444; }
    if ($not_allowed_method) { return 405; }

    limit_conn conn_per_ip 20;
    limit_req zone=req_general burst=60 nodelay;

    client_max_body_size 50M;

    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~* /(?:composer\.(json|lock)|package\.json|package-lock\.json|yarn\.lock|\.env(\..*)?|artisan|README\.md)$ { deny all; }
    location ~* ^/(?:storage|vendor|node_modules|tests|database|config)/ { deny all; }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location ~ ^/(login|logout|register|password|two-factor|sanctum/csrf-cookie) {
        limit_req zone=req_auth burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/api/ {
        limit_req zone=req_api burst=40 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|css|js|woff2?|ttf|eot|map)$ {
        try_files $uri /index.php?$query_string;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass lar_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_connect_timeout 10;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_hide_header X-Powered-By;
    }
}

# ────────────────────────────────────────────────────────────
# RESTAURANTE :80 (default_server)
# Aceita 143.95.213.17 e *.143.95.213.17.sslip.io
# Frontend: estático (build do Vite)
# Backend:  /api, /sanctum, /horizon, /storage → PHP-FPM
# ────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ~^(?<sub>.+)\.143\.95\.213\.17\.sslip\.io$ 143.95.213.17 _;

    if ($bad_bot) { return 444; }
    if ($not_allowed_method) { return 405; }

    limit_conn conn_per_ip 20;
    limit_req zone=req_general burst=60 nodelay;

    client_max_body_size 50M;

    # Frontend (Vite build) servido como estático
    root /var/www/restaurante_frontend;
    index index.html;

    # ---- Backend Laravel ----
    # /api, /sanctum, /horizon, /storage → roteia para o public do Laravel
    location ~ ^/(api|sanctum|horizon)(/.*)?$ {
        root /var/www/restaurante/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/restaurante/public/storage/;
    }

    location ~ \.php$ {
        root /var/www/restaurante/public;
        fastcgi_pass restaurante_app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_SUBDOMAIN $subdomain;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_hide_header X-Powered-By;
    }

    # ---- Frontend assets ----
    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|css|js|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Arquivos sensíveis
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
