map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Extrai subdomínio (usado pelo restaurante multi-tenant)
map $host $subdomain {
    ~^(?<sub>[^.]+)\..*$ $sub;
    default              '';
}

# ─── LAR ──────────────────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name lar.localhost larpadronizacao.com.br www.larpadronizacao.com.br;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    root /var/www/lar/public;
    index index.php index.html;
    charset utf-8;
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        fastcgi_pass lar_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.ht { deny all; }

    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|webp|svg|woff|woff2|ttf|eot)$ {
        try_files $uri /index.php?$query_string;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public";
    }
}

# ─── RESTAURANTE (subdomínios *.localhost + localhost raiz) ─
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name ~^(?<sub>.+)\.localhost$ localhost restaurante.localhost;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    charset utf-8;
    client_max_body_size 50M;

    proxy_set_header X-Subdomain $subdomain;
    proxy_set_header X-Forwarded-Host $host;

    # API / Sanctum / Horizon → Laravel
    location ~ ^/(api|sanctum|horizon)(/.*)?$ {
        root /var/www/restaurante/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/restaurante/public/storage/;
    }

    location ~ \.php$ {
        root /var/www/restaurante/public;
        fastcgi_pass restaurante_app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_SUBDOMAIN $subdomain;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # Vite HMR
    location /vite-hmr {
        proxy_pass http://restaurante_frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # React (Vite dev server)
    location / {
        proxy_pass http://restaurante_frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
