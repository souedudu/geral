user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 100;
    reset_timedout_connection on;
    types_hash_max_size 2048;

    client_body_timeout    10s;
    client_header_timeout  10s;
    send_timeout           15s;

    client_body_buffer_size      16k;
    client_header_buffer_size    1k;
    large_client_header_buffers  4 8k;
    client_max_body_size         50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml application/x-font-ttf
        font/opentype application/vnd.ms-fontobject;

    limit_req_zone $binary_remote_addr zone=req_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=req_auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=req_api:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    limit_req_status 429;
    limit_conn_status 429;

    map $http_user_agent $bad_bot {
        default 0;
        ""                                   1;
        "~*(nikto|sqlmap|nmap|masscan|fuzz)" 1;
    }

    map $request_method $not_allowed_method {
        default 1;
        GET 0; HEAD 0; POST 0; PUT 0; PATCH 0; DELETE 0; OPTIONS 0;
    }

    # Extrai primeiro label do host: para "demo.bravopdv.com.br" -> "demo"
    map $host $subdomain {
        ~^(?<sub>[^.]+)\..*$ $sub;
        default              '';
    }

    include /etc/nginx/conf.d/*.conf;
}
