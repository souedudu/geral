services:

  # ─── Nginx único (porta 80) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: stack_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./lar/src:/var/www/lar
      - ./restaurante/backend:/var/www/restaurante
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - lar_app
      - restaurante_app
    networks:
      - stack

  # ─── Lar (php-fpm) ───────────────────────────────────────
  lar_app:
    build:
      context: ./lar/docker/php
      dockerfile: Dockerfile
    container_name: lar_app
    restart: unless-stopped
    working_dir: /var/www/lar
    volumes:
      - ./lar/src:/var/www/lar
      - ./lar/docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./lar/docker/supervisord/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    environment:
      - PHP_OPCACHE_ENABLE=1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stack

  # ─── Restaurante (php-fpm) ───────────────────────────────
  restaurante_app:
    build:
      context: ./restaurante/docker/php
      dockerfile: Dockerfile
    container_name: restaurante_app
    restart: unless-stopped
    working_dir: /var/www/restaurante
    volumes:
      - ./restaurante/backend:/var/www/restaurante
      - ./restaurante/docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stack

  # ─── Horizon (filas restaurante) ─────────────────────────
  restaurante_horizon:
    build:
      context: ./restaurante/docker/php
      dockerfile: Dockerfile
    container_name: restaurante_horizon
    restart: unless-stopped
    working_dir: /var/www/restaurante
    command: php artisan horizon
    volumes:
      - ./restaurante/backend:/var/www/restaurante
      - ./restaurante/docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stack

  # ─── Frontend React/Vite (restaurante) ───────────────────
  restaurante_frontend:
    build:
      context: ./restaurante/frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: restaurante_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./restaurante/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost}
      - VITE_PUSHER_APP_KEY=${PUSHER_APP_KEY}
      - VITE_PUSHER_APP_CLUSTER=${PUSHER_APP_CLUSTER:-mt1}
    networks:
      - stack

  # ─── MySQL compartilhado (dois DBs via init.sql) ─────────
  mysql:
    image: mysql:8.4
    container_name: stack_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --mysql-native-password=ON
    networks:
      - stack

  # ─── Redis compartilhado ─────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: stack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stack

  # ─── phpMyAdmin ──────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: stack_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - stack

  # ─── Mailpit ─────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: stack_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - stack

volumes:
  mysql_data:
  redis_data:

networks:
  stack:
    driver: bridge
