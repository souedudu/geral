# =====================================================================
# Stack unificada — PRODUÇÃO
# Sobe lar (HTTPS) + restaurante (HTTPS em bravopdv.com.br) num único host.
#
# Uso:
#   cp .env.prod.example                 .env.prod
#   cp lar/.env.prod.example             lar/.env.prod
#   cp restaurante/.env.prod.example     restaurante/.env.prod
#   # editar os três arquivos
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# =====================================================================
services:

  # ─── Nginx único (80 + 443) ─────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: stack_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - lar_public:/var/www/lar/public:ro
      - restaurante_public:/var/www/restaurante/public:ro
      - restaurante_frontend_dist:/var/www/restaurante_frontend:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - lar_app
      - restaurante_app
      - restaurante_frontend_build
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Lar (php-fpm prod) ─────────────────────────────────
  lar_app:
    build:
      context: ./lar
      dockerfile: docker/php/Dockerfile.prod
    image: lar_app:prod
    container_name: lar_app
    restart: always
    working_dir: /var/www
    env_file: ./lar/.env.prod
    environment:
      - PHP_OPCACHE_ENABLE=1
    volumes:
      - lar_storage:/var/www/storage
      - lar_bootstrap_cache:/var/www/bootstrap/cache
      - lar_public:/var/www/public
      - ./lar/.env.prod:/var/www/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Lar queue worker ───────────────────────────────────
  lar_queue:
    image: lar_app:prod
    container_name: lar_queue
    restart: always
    working_dir: /var/www
    env_file: ./lar/.env.prod
    volumes:
      - lar_storage:/var/www/storage
      - lar_bootstrap_cache:/var/www/bootstrap/cache
      - ./lar/.env.prod:/var/www/.env:ro
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --backoff=5
    depends_on:
      - lar_app
      - redis
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Lar scheduler ──────────────────────────────────────
  lar_scheduler:
    image: lar_app:prod
    container_name: lar_scheduler
    restart: always
    working_dir: /var/www
    env_file: ./lar/.env.prod
    volumes:
      - lar_storage:/var/www/storage
      - lar_bootstrap_cache:/var/www/bootstrap/cache
      - ./lar/.env.prod:/var/www/.env:ro
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      - lar_app
      - redis
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Restaurante (php-fpm prod) ─────────────────────────
  restaurante_app:
    build:
      context: ./restaurante
      dockerfile: docker/php/Dockerfile.prod
    image: restaurante_app:prod
    container_name: restaurante_app
    restart: always
    working_dir: /var/www
    env_file: ./restaurante/.env.prod
    volumes:
      - restaurante_storage:/var/www/storage
      - restaurante_bootstrap_cache:/var/www/bootstrap/cache
      - restaurante_public:/var/www/public
      - ./restaurante/.env.prod:/var/www/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Restaurante Horizon (queues) ───────────────────────
  restaurante_horizon:
    image: restaurante_app:prod
    container_name: restaurante_horizon
    restart: always
    working_dir: /var/www
    env_file: ./restaurante/.env.prod
    command: php artisan horizon
    volumes:
      - restaurante_storage:/var/www/storage
      - restaurante_bootstrap_cache:/var/www/bootstrap/cache
      - ./restaurante/.env.prod:/var/www/.env:ro
    depends_on:
      - restaurante_app
      - redis
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Restaurante scheduler ──────────────────────────────
  restaurante_scheduler:
    image: restaurante_app:prod
    container_name: restaurante_scheduler
    restart: always
    working_dir: /var/www
    env_file: ./restaurante/.env.prod
    volumes:
      - restaurante_storage:/var/www/storage
      - restaurante_bootstrap_cache:/var/www/bootstrap/cache
      - ./restaurante/.env.prod:/var/www/.env:ro
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      - restaurante_app
      - redis
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Restaurante frontend (Vite -> static -> volume) ────
  # Faz o build do Vite, copia o /dist para o volume compartilhado
  # com o nginx e fica parado. Para refazer o build, basta:
  #   docker compose -f docker-compose.prod.yml up -d --build restaurante_frontend_build
  restaurante_frontend_build:
    build:
      context: ./restaurante/frontend
      dockerfile: ../docker/frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_PUSHER_APP_KEY: ${VITE_PUSHER_APP_KEY}
        VITE_PUSHER_APP_CLUSTER: ${VITE_PUSHER_APP_CLUSTER:-mt1}
    image: restaurante_frontend:prod
    container_name: restaurante_frontend_build
    restart: "no"
    volumes:
      - restaurante_frontend_dist:/export
    command: sh -c "rsync -a --delete /dist/ /export/ && echo 'frontend exported'"
    networks:
      - stack

  # ─── MySQL compartilhado ────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: stack_mysql
    restart: always
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${APP_DB_USER:-app}
      MYSQL_PASSWORD: ${APP_DB_PASSWORD}
      MYSQL_DATABASE: lar
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.prod.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=300
      --mysql-native-password=ON
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Redis compartilhado (com auth) ─────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: stack_redis
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Certbot (HTTPS para lar e restaurante) ─────────────
  certbot:
    image: certbot/certbot:latest
    container_name: stack_certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'
    networks:
      - stack
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Evolution API (lar) ────────────────────────────────
  evolution:
    image: evoapicloud/evolution-go:latest
    container_name: stack_evolution
    restart: always
    expose:
      - "8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      SERVER_PORT: 8080
      CLIENT_NAME: lar
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      POSTGRES_HOST: evolution_postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${EVOLUTION_PG_USER}
      POSTGRES_PASSWORD: ${EVOLUTION_PG_PASSWORD}
      POSTGRES_DB: ${EVOLUTION_PG_DB}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/3
      CACHE_REDIS_PREFIX_KEY: evolution
      LOG_LEVEL: ERROR
      QRCODE_MAX_COUNT: 40
      DEL_INSTANCE: "false"
      MINIO_ENABLED: "false"
    networks:
      - stack
    depends_on:
      - redis
      - evolution_postgres
    volumes:
      - evolution_instances:/evolution/instances
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  evolution_postgres:
    image: postgres:16-alpine
    container_name: stack_evolution_postgres
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${EVOLUTION_PG_DB}
      POSTGRES_USER: ${EVOLUTION_PG_USER}
      POSTGRES_PASSWORD: ${EVOLUTION_PG_PASSWORD}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - stack
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_PG_USER} -d ${EVOLUTION_PG_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  stack:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  lar_storage:
  lar_bootstrap_cache:
  lar_public:
  restaurante_storage:
  restaurante_bootstrap_cache:
  restaurante_public:
  restaurante_frontend_dist:
  certbot_certs:
  certbot_www:
  evolution_instances:
  evolution_postgres_data:
